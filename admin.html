<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>小区管理后台</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f4f8;min-height:100vh}.C{max-width:960px;margin:0 auto;padding:20px}.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}h1{font-size:20px;color:#1a1a1a;margin-bottom:16px}h2{font-size:15px;color:#1a1a1a;margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid #f0f0f0}.stats{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}.sb{flex:1;min-width:90px;text-align:center;padding:14px;border-radius:10px}.sb.t{background:#e6f7ff}.sb.a{background:#f6ffed}.sb.d{background:#fff2f0}.sb .n{font-size:28px;font-weight:700}.sb.t .n{color:#1890ff}.sb.a .n{color:#52c41a}.sb.d .n{color:#ff4d4f}.sb .l{font-size:12px;color:#666;margin-top:4px}.tabs{display:flex;margin-bottom:14px;border-radius:8px;overflow:hidden;border:1px solid #ddd}.tab{flex:1;padding:9px;text-align:center;cursor:pointer;background:#fafafa;font-size:13px;font-weight:500;border:none}.tab.ac{background:#1890ff;color:#fff}table{width:100%;border-collapse:collapse}th{background:#fafafa;padding:7px;font-size:12px;color:#666;border-bottom:2px solid #f0f0f0;text-align:left}td{padding:7px;font-size:12px;border-bottom:1px solid #f0f0f0;color:#333}.bg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}.bg.a{background:#f6ffed;color:#52c41a}.bg.d{background:#fff2f0;color:#ff4d4f}.btn{color:#fff;border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;float:right;margin-left:5px}.bb{background:#1890ff}.bg2{background:#52c41a}.br{background:#ff4d4f}.dr{background:transparent;color:#ff4d4f;border:1px solid #ffccc7;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:11px}.cr{display:flex;align-items:center;margin-bottom:7px;gap:5px}.cr label{width:65px;font-size:12px;color:#666;text-align:right;flex-shrink:0}.cr input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px}.xb{background:#ff4d4f;color:#fff;border:none;width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:13px;flex-shrink:0}.ab{background:#f5f5f5;color:#666;border:1px dashed #ccc;padding:5px;border-radius:6px;cursor:pointer;font-size:11px;width:100%}.lb{background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;padding:8px;font-size:11px;word-break:break-all;margin:6px 0}.pb{text-align:center;margin:40px 0}.pb input{padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:150px;margin:3px}.pb button{padding:9px 18px;background:#1890ff;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}.svb{background:#faad14;color:#fff;border:none;padding:7px 18px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500}.fr{display:flex;align-items:center;margin-bottom:6px;gap:5px;padding:6px;background:#fafafa;border-radius:6px}.fr .fn{width:70px;padding:5px 7px;border:1px solid #ddd;border-radius:5px;font-size:12px}.fr select{padding:5px;border:1px solid #ddd;border-radius:5px;font-size:11px}.fr .oi{flex:1;padding:5px 7px;border:1px solid #ddd;border-radius:5px;font-size:11px}.empty{text-align:center;color:#999;padding:30px 0;font-size:12px}</style></head>
<body>
<div class="C" id="lg"><div class="card"><h1 style="text-align:center">🔐 小区管理后台</h1><div class="pb"><input type="text" id="ci" placeholder="小区ID"><br><input type="password" id="pi" placeholder="管理密码"><br><button onclick="login()">登录</button></div></div></div>
<div class="C" id="ma" style="display:none">
<div class="card"><h2>📋 小区信息</h2><p id="cn" style="font-size:16px;font-weight:600;margin-bottom:6px"></p><p style="font-size:11px;color:#888;margin-bottom:4px">业主投票链接：</p><div class="lb" id="vl"></div></div>
<div class="card"><h2>📝 投票信息编辑</h2>
<div class="cr"><label>标题</label><input type="text" id="ct"></div>
<div class="cr"><label>副标题</label><input type="text" id="cs"></div>
<div class="cr"><label>提示语</label><input type="text" id="cno"></div>
<h3 style="font-size:13px;margin:10px 0 6px">信息展示项</h3><div id="cii"></div><button class="ab" onclick="aI()">+ 添加信息项</button>
<h3 style="font-size:13px;margin:12px 0 6px">自定义表单字段</h3><p style="font-size:10px;color:#999;margin-bottom:6px">姓名、楼栋、房号为固定必填项</p><div id="cff"></div><button class="ab" onclick="aF()">+ 添加字段</button>
<div style="margin-top:14px;text-align:right"><button class="svb" onclick="saveCfg()">💾 保存修改</button></div></div>
<div class="card"><h1>📊 投票数据</h1>
<div class="stats"><div class="sb t"><div class="n" id="tc">0</div><div class="l">总票数</div></div><div class="sb a"><div class="n" id="ac">0</div><div class="l">赞成</div></div><div class="sb d"><div class="n" id="dc">0</div><div class="l">反对</div></div></div>
<button class="btn br" onclick="rst()">🗑 清空投票</button><button class="btn bg2" onclick="exp()">导出Excel</button><button class="btn bb" onclick="ldD()">刷新</button>
<div style="clear:both;margin-bottom:10px"></div>
<div class="tabs"><button class="tab ac" onclick="sT('all',this)">全部</button><button class="tab" onclick="sT('agree',this)">赞成</button><button class="tab" onclick="sT('disagree',this)">反对</button></div>
<table><thead><tr><th>序号</th><th>姓名</th><th>楼栋</th><th>房号</th><th>其他</th><th>投票</th><th>时间</th><th>操作</th></tr></thead><tbody id="tb"></tbody></table>
<div id="emp" class="empty" style="display:none">暂无投票记录</div></div></div>
<script>
let cid='',pw='',cfg=null,dat=null,ct2='all';
function login(){cid=document.getElementById('ci').value.trim();pw=document.getElementById('pi').value.trim();if(!cid||!pw)return alert('请输入完整');fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cid,pwd:pw})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('lg').style.display='none';document.getElementById('ma').style.display='block';document.getElementById('cn').textContent=d.name;document.getElementById('vl').textContent=location.origin+'/?cid='+cid;ldD();ldC()}else alert('密码错误')})}
function ldD(){fetch('/api/admin?cid='+cid).then(r=>r.json()).then(d=>{dat=d;document.getElementById('tc').textContent=d.agree+d.disagree;document.getElementById('ac').textContent=d.agree;document.getElementById('dc').textContent=d.disagree;rT()})}
function ldC(){fetch('/api/config?cid='+cid).then(r=>r.json()).then(c=>{cfg=c;document.getElementById('ct').value=c.title;document.getElementById('cs').value=c.subtitle;document.getElementById('cno').value=c.notice;rCI();rCF()})}
function rCI(){document.getElementById('cii').innerHTML=(cfg.infoItems||[]).map((it,i)=>'<div class="cr"><label>项目'+(i+1)+'</label><input value="'+it.label+'" id="ik'+i+'" style="flex:.5"><input value="'+it.value+'" id="iv'+i+'"><button class="xb" onclick="cfg.infoItems.splice('+i+',1);rCI()">×</button></div>').join('')}
function aI(){cfg.infoItems.push({label:'',value:''});rCI()}
function rCF(){document.getElementById('cff').innerHTML=(cfg.customFields||[]).map((f,i)=>'<div class="fr"><input class="fn" value="'+f.label+'" id="fl'+i+'" placeholder="字段名"><select id="ft'+i+'"><option value="text"'+(f.type==='text'?' selected':'')+'>文本</option><option value="select"'+(f.type==='select'?' selected':'')+'>选项</option></select><input class="oi" value="'+(f.options||[]).join(',')+'" id="fo'+i+'" placeholder="选项用逗号分隔"><label style="font-size:11px"><input type="checkbox" id="fr'+i+'"'+(f.required?' checked':'')+'>必填</label><button class="xb" onclick="cfg.customFields.splice('+i+',1);rCF()">×</button></div>').join('')}
function aF(){cfg.customFields.push({key:'f'+Date.now(),label:'',type:'text',required:false,options:[]});rCF()}
function saveCfg(){const items=[];let i=0;while(document.getElementById('ik'+i)){const k=document.getElementById('ik'+i).value.trim(),v=document.getElementById('iv'+i).value.trim();if(k&&v)items.push({label:k,value:v});i++}const fields=[];i=0;while(document.getElementById('fl'+i)){const l=document.getElementById('fl'+i).value.trim();if(!l){i++;continue}const t=document.getElementById('ft'+i).value,r=document.getElementById('fr'+i).checked,o=document.getElementById('fo'+i).value.trim();fields.push({key:'f'+i+'_'+Date.now(),label:l,type:t,required:r,options:t==='select'?o.split(',').map(s=>s.trim()).filter(Boolean):[]});i++}fetch('/api/admin/config?cid='+cid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,config:{title:document.getElementById('ct').value.trim(),subtitle:document.getElementById('cs').value.trim(),notice:document.getElementById('cno').value.trim(),infoItems:items,customFields:fields}})}).then(r=>r.json()).then(d=>alert(d.success?'保存成功':'保存失败'))}
function delV(k){if(!confirm('确定删除？'))return;fetch('/api/admin/delete-voter?cid='+cid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,key:k})}).then(r=>r.json()).then(d=>{if(d.success)ldD()})}
function rst(){if(!confirm('⚠️ 确定清空所有投票？'))return;fetch('/api/admin/reset?cid='+cid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw})}).then(r=>r.json()).then(d=>{if(d.success){alert('已清空');ldD()}})}
function rT(){if(!dat)return;let v=dat.voters;if(ct2==='agree')v=v.filter(x=>x.vote==='agree');if(ct2==='disagree')v=v.filter(x=>x.vote==='disagree');const tb=document.getElementById('tb'),em=document.getElementById('emp');if(!v.length){tb.innerHTML='';em.style.display='block';return}em.style.display='none';tb.innerHTML=v.map((x,i)=>{const b=x.vote==='agree'?'<span class="bg a">赞成</span>':'<span class="bg d">反对</span>';const o=Object.values(x.fields||{}).filter(Boolean).join('/');const t=new Date(x.time).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});return '<tr><td>'+(i+1)+'</td><td>'+x.name+'</td><td>'+x.building+'</td><td>'+x.room+'</td><td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(o||'-')+'</td><td>'+b+'</td><td>'+t+'</td><td><button class="dr" onclick="delV(\''+x.key+'\')">删</button></td></tr>'}).join('')}
function sT(t,el){ct2=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('ac'));el.classList.add('ac');rT()}
function exp(){if(!dat||!dat.voters.length)return alert('暂无数据');let c='\uFEFF序号,姓名,楼栋,房号,投票,时间\n';dat.voters.forEach((v,i)=>{c+=(i+1)+','+v.name+','+v.building+','+v.room+','+(v.vote==='agree'?'赞成':'反对')+','+new Date(v.time).toLocaleString('zh-CN')+'\n'});const b=new Blob([c],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='投票记录.csv';a.click()}
</script></body></html>
