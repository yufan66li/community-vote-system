<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>超级管理员</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a2e;min-height:100vh;color:#fff}.C{max-width:1000px;margin:0 auto;padding:20px}.card{background:#16213e;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.3);border:1px solid #0f3460}h1{font-size:22px;margin-bottom:16px;background:linear-gradient(90deg,#e94560,#667eea);-webkit-background-clip:text;-webkit-text-fill-color:transparent}h2{font-size:16px;margin:14px 0 10px;color:#e2e2e2}.pb{text-align:center;margin:60px 0}.pb input{padding:10px 14px;border:1px solid #0f3460;border-radius:8px;font-size:14px;width:200px;margin:4px;background:#1a1a2e;color:#fff}.pb button{padding:10px 24px;background:linear-gradient(135deg,#e94560,#667eea);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}table{width:100%;border-collapse:collapse}th{padding:10px 8px;font-size:12px;color:#888;text-align:left;border-bottom:2px solid #0f3460}td{padding:10px 8px;font-size:13px;border-bottom:1px solid #0f3460}tr:hover td{background:#1a1a2e}.bg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}.bg.a{background:#f6ffed;color:#52c41a}.bg.d{background:#fff2f0;color:#ff4d4f}.btn{border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin:2px}.bb{background:#1890ff;color:#fff}.bg2{background:#52c41a;color:#fff}.br{background:#ff4d4f;color:#fff}.by{background:#faad14;color:#fff}.fr{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}.fr input,.fr select{padding:6px 10px;border:1px solid #0f3460;border-radius:6px;font-size:13px;background:#1a1a2e;color:#fff}.fr label{font-size:12px;color:#aaa}.link{color:#667eea;font-size:12px;word-break:break-all}.stat{display:inline-block;padding:4px 10px;border-radius:8px;margin:2px;font-size:12px}.stat.t{background:#0f3460;color:#1890ff}.stat.a{background:#0f3460;color:#52c41a}.stat.d{background:#0f3460;color:#ff4d4f}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:99;align-items:center;justify-content:center}.modal.show{display:flex}.modal-c{background:#16213e;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid #0f3460}.modal-c h3{margin-bottom:12px}.close{float:right;cursor:pointer;font-size:20px;color:#888}</style></head>
<body>
<div class="C" id="lg"><div class="card"><h1 style="text-align:center">🔐 业主公共事项投票系统 · 超级管理</h1><div class="pb"><input type="password" id="pi" placeholder="超级管理员密码"><br><br><button onclick="login()">进入</button></div></div></div>
<div class="C" id="ma" style="display:none">
<div class="card"><h1>🏠 业主公共事项投票系统 · 超级管理</h1><p style="font-size:13px;color:#888">管理所有小区、创建投票、查看数据</p></div>
<div class="card"><h2>➕ 新建小区投票</h2>
<div class="fr"><input type="text" id="nid" placeholder="小区ID（英文，如xhxx）" style="width:140px"><input type="text" id="nname" placeholder="小区名称" style="width:160px"><input type="number" id="nhh" placeholder="户数" style="width:80px"><input type="text" id="npwd" placeholder="管理密码" style="width:140px"><button class="btn bg2" onclick="createC()">创建</button></div></div>
<div class="card"><h2>📊 所有小区概况</h2><table><thead><tr><th>小区</th><th>户数</th><th>管理密码</th><th>投票情况</th><th>操作</th></tr></thead><tbody id="tb"></tbody></table></div>
</div>
<div class="modal" id="md"><div class="modal-c"><span class="close" onclick="document.getElementById('md').classList.remove('show')">✕</span><div id="mdc"></div></div></div>
<script>
let pw='';
function login(){pw=document.getElementById('pi').value.trim();if(!pw)return;fetch('/api/super/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('lg').style.display='none';document.getElementById('ma').style.display='block';loadList()}else alert('密码错误')})}
function loadList(){fetch('/api/super/list').then(r=>r.json()).then(list=>{document.getElementById('tb').innerHTML=list.map(c=>'<tr><td><b>'+c.name+'</b><br><span class="link">'+location.origin+'/?cid='+c.id+'</span></td><td>'+c.household+'</td><td><code style="color:#faad14">'+c.adminPwd+'</code></td><td><span class="stat t">总'+c.total+'</span><span class="stat a">赞成'+c.agree+'</span><span class="stat d">反对'+c.disagree+'</span></td><td><button class="btn bb" onclick="viewC(\''+c.id+'\')">查看</button><button class="btn by" onclick="rstPwd(\''+c.id+'\')">改密码</button><button class="btn br" onclick="delC(\''+c.id+'\',\''+c.name+'\')">删除</button></td></tr>').join('')})}
function createC(){const id=document.getElementById('nid').value.trim(),nm=document.getElementById('nname').value.trim(),hh=parseInt(document.getElementById('nhh').value)||0,np=document.getElementById('npwd').value.trim();if(!id||!nm)return alert('请填写ID和名称');if(!np)return alert('请设置管理密码');fetch('/api/super/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,id,name:nm,households:hh,adminPwd:np})}).then(r=>r.json()).then(d=>{if(d.success){alert('创建成功！');document.getElementById('nid').value='';document.getElementById('nname').value='';document.getElementById('nhh').value='';document.getElementById('npwd').value='';loadList()}else alert(d.message||'创建失败')})}
function delC(id,nm){if(!confirm('确定删除「'+nm+'」？投票数据将全部清除！'))return;fetch('/api/super/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,id})}).then(r=>r.json()).then(d=>{if(d.success)loadList();else alert('删除失败')})}
function rstPwd(id){const np=prompt('请输入新密码：');if(!np)return;fetch('/api/super/reset-pwd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,cid:id,newPwd:np})}).then(r=>r.json()).then(d=>{if(d.success){alert('密码已改为：'+np);loadList()}else alert('修改失败')})}
function viewC(id){fetch('/api/super/detail?cid='+id).then(r=>r.json()).then(d=>{const v=d.votes;let h='<h3>'+d.name+' 详细数据</h3><p style="font-size:12px;color:#aaa;margin:8px 0">赞成 '+v.agree+' / 反对 '+v.disagree+' / 共 '+(v.agree+v.disagree)+' 票</p>';if(v.voters.length){h+='<table style="width:100%;margin-top:10px"><thead><tr><th>姓名</th><th>楼栋</th><th>房号</th><th>投票</th><th>时间</th></tr></thead><tbody>';v.voters.forEach(x=>{h+='<tr><td>'+x.name+'</td><td>'+x.building+'</td><td>'+x.room+'</td><td>'+(x.vote==='agree'?'<span class="bg a">赞成</span>':'<span class="bg d">反对</span>')+'</td><td>'+new Date(x.time).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})+'</td></tr>'});h+='</tbody></table>'}else h+='<p style="color:#666;text-align:center;padding:20px">暂无投票</p>';document.getElementById('mdc').innerHTML=h;document.getElementById('md').classList.add('show')})}
</script></body></html>
