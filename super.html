<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>и¶…зә§з®ЎзҗҶе‘ҳ</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a2e;min-height:100vh;color:#fff}.C{max-width:1100px;margin:0 auto;padding:20px}.card{background:#16213e;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.3);border:1px solid #0f3460}h1{font-size:22px;margin-bottom:16px;background:linear-gradient(90deg,#e94560,#667eea);-webkit-background-clip:text;-webkit-text-fill-color:transparent}h2{font-size:16px;margin:14px 0 10px;color:#e2e2e2}.pb{text-align:center;margin:60px 0}.pb input{padding:10px 14px;border:1px solid #0f3460;border-radius:8px;font-size:14px;width:200px;margin:4px;background:#1a1a2e;color:#fff}.pb button{padding:10px 24px;background:linear-gradient(135deg,#e94560,#667eea);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}table{width:100%;border-collapse:collapse}th{padding:10px 8px;font-size:12px;color:#888;text-align:left;border-bottom:2px solid #0f3460}td{padding:10px 8px;font-size:13px;border-bottom:1px solid #0f3460}tr:hover td{background:#1a1a2e}.bg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}.bg.a{background:#f6ffed;color:#52c41a}.bg.d{background:#fff2f0;color:#ff4d4f}.bg.ab{background:#fffbe6;color:#d48806}.btn{border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin:2px}.bb{background:#1890ff;color:#fff}.bg2{background:#52c41a;color:#fff}.br{background:#ff4d4f;color:#fff}.by{background:#faad14;color:#fff}.be{background:#722ed1;color:#fff}.fr{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}.fr input,.fr select{padding:6px 10px;border:1px solid #0f3460;border-radius:6px;font-size:13px;background:#1a1a2e;color:#fff}.fr label{font-size:12px;color:#aaa}.link{color:#667eea;font-size:12px;word-break:break-all}.stat{display:inline-block;padding:4px 10px;border-radius:8px;margin:2px;font-size:12px}.stat.t{background:#0f3460;color:#1890ff}.stat.a{background:#0f3460;color:#52c41a}.stat.d{background:#0f3460;color:#ff4d4f}.stat.ab{background:#0f3460;color:#faad14}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:99;align-items:center;justify-content:center}.modal.show{display:flex}.modal-c{background:#16213e;border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto;border:1px solid #0f3460}.modal-c h3{margin-bottom:12px}.close{float:right;cursor:pointer;font-size:20px;color:#888}.sig-thumb{width:50px;height:25px;border:1px solid #0f3460;border-radius:4px;cursor:pointer}</style></head>
<body>
<div class="C" id="lg"><div class="card"><h1 style="text-align:center">рҹ”җ дёҡдё»е…¬е…ұдәӢйЎ№жҠ•зҘЁзі»з»ҹ В· и¶…зә§з®ЎзҗҶ</h1><div class="pb"><input type="password" id="pi" placeholder="и¶…зә§з®ЎзҗҶе‘ҳеҜҶз Ғ"><br><br><button onclick="login()">иҝӣе…Ҙ</button></div></div></div>
<div class="C" id="ma" style="display:none">
<div class="card"><h1>рҹҸ  дёҡдё»е…¬е…ұдәӢйЎ№жҠ•зҘЁзі»з»ҹ В· и¶…зә§з®ЎзҗҶ</h1><p style="font-size:13px;color:#888">з®ЎзҗҶжүҖжңүе°ҸеҢәгҖҒеҲӣе»әжҠ•зҘЁгҖҒжҹҘзңӢе’ҢеҜјеҮәж•°жҚ®</p></div>
<div class="card"><h2>вһ• ж–°е»әе°ҸеҢәжҠ•зҘЁ</h2>
<div class="fr"><input type="text" id="nid" placeholder="е°ҸеҢәIDпјҲиӢұж–ҮпјҢеҰӮxhxxпјү" style="width:140px"><input type="text" id="nname" placeholder="е°ҸеҢәеҗҚз§°" style="width:160px"><input type="number" id="nhh" placeholder="жҲ·ж•°" style="width:80px"><input type="text" id="npwd" placeholder="з®ЎзҗҶеҜҶз Ғ" style="width:140px"><button class="btn bg2" onclick="createC()">еҲӣе»ә</button></div></div>
<div class="card"><h2>рҹ“Ҡ жүҖжңүе°ҸеҢәжҰӮеҶө</h2><table><thead><tr><th>е°ҸеҢә</th><th>жҲ·ж•°</th><th>з®ЎзҗҶеҜҶз Ғ</th><th>жҠ•зҘЁжғ…еҶө</th><th>ж“ҚдҪң</th></tr></thead><tbody id="tb"></tbody></table></div>
</div>
<div class="modal" id="md"><div class="modal-c"><span class="close" onclick="document.getElementById('md').classList.remove('show')">вң•</span><div id="mdc"></div></div></div>
<script>
let pw='';
function login(){pw=document.getElementById('pi').value.trim();if(!pw)return;fetch('/api/super/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('lg').style.display='none';document.getElementById('ma').style.display='block';loadList()}else alert('еҜҶз Ғй”ҷиҜҜ')})}
function loadList(){fetch('/api/super/list').then(r=>r.json()).then(list=>{document.getElementById('tb').innerHTML=list.map(c=>'<tr><td><b>'+c.name+'</b><br><span class="link">'+location.origin+'/?cid='+c.id+'</span></td><td>'+c.households+'</td><td><code style="color:#faad14">'+c.adminPwd+'</code></td><td><span class="stat t">жҖ»'+c.total+'</span><span class="stat a">иөһжҲҗ'+c.agree+'</span><span class="stat d">еҸҚеҜ№'+c.disagree+'</span><span class="stat ab">ејғжқғ'+c.abstain+'</span></td><td><button class="btn bb" onclick="viewC(\''+c.id+'\')">жҹҘзңӢ</button><button class="btn be" onclick="expC(\''+c.id+'\',\''+c.name+'\')">еҜјеҮә</button><button class="btn by" onclick="rstPwd(\''+c.id+'\')">ж”№еҜҶз Ғ</button><button class="btn br" onclick="delC(\''+c.id+'\',\''+c.name+'\')">еҲ йҷӨ</button></td></tr>').join('')})}
function createC(){const id=document.getElementById('nid').value.trim(),nm=document.getElementById('nname').value.trim(),hh=parseInt(document.getElementById('nhh').value)||0,np=document.getElementById('npwd').value.trim();if(!id||!nm)return alert('иҜ·еЎ«еҶҷIDе’ҢеҗҚз§°');if(!np)return alert('иҜ·и®ҫзҪ®з®ЎзҗҶеҜҶз Ғ');fetch('/api/super/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,id,name:nm,households:hh,adminPwd:np})}).then(r=>r.json()).then(d=>{if(d.success){alert('еҲӣе»әжҲҗеҠҹпјҒ');document.getElementById('nid').value='';document.getElementById('nname').value='';document.getElementById('nhh').value='';document.getElementById('npwd').value='';loadList()}else alert(d.message||'еҲӣе»әеӨұиҙҘ')})}
function delC(id,nm){if(!confirm('зЎ®е®ҡеҲ йҷӨгҖҢ'+nm+'гҖҚпјҹжҠ•зҘЁж•°жҚ®е°Ҷе…ЁйғЁжё…йҷӨпјҒ'))return;fetch('/api/super/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,id})}).then(r=>r.json()).then(d=>{if(d.success)loadList();else alert('еҲ йҷӨеӨұиҙҘ')})}
function rstPwd(id){const np=prompt('иҜ·иҫ“е…Ҙж–°еҜҶз Ғпјҡ');if(!np)return;fetch('/api/super/reset-pwd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwd:pw,cid:id,newPwd:np})}).then(r=>r.json()).then(d=>{if(d.success){alert('еҜҶз Ғе·Іж”№дёәпјҡ'+np);loadList()}else alert('дҝ®ж”№еӨұиҙҘ')})}
function expC(id,nm){window.open('/api/super/export?cid='+id,'_blank')}
function showSig(sig){if(!sig)return;const m2=document.getElementById('md');document.getElementById('mdc').innerHTML='<h3>дёҡдё»зӯҫеҗҚ</h3><img src="'+sig+'" style="width:100%;max-width:400px;border:1px solid #0f3460;border-radius:8px">';m2.classList.add('show')}
function viewC(id){fetch('/api/super/detail?cid='+id).then(r=>r.json()).then(d=>{const v=d.votes,cfg=d.config;const total=v.agree+v.disagree+(v.abstain||0);let h='<h3>'+d.name+' иҜҰз»Ҷж•°жҚ®</h3><p style="font-size:12px;color:#aaa;margin:8px 0">иөһжҲҗ '+v.agree+' / еҸҚеҜ№ '+v.disagree+' / ејғжқғ '+(v.abstain||0)+' / е…ұ '+total+' зҘЁ</p><div style="margin-bottom:10px"><button class="btn be" onclick="expC(\''+d.id+'\',\''+d.name+'\')">рҹ“Ҙ еҜјеҮәCSV</button></div>';if(v.voters.length){const flds=cfg&&cfg.customFields?cfg.customFields:[];h+='<table style="width:100%;margin-top:10px"><thead><tr><th>е§“еҗҚ</th><th>жҘјж Ӣ</th><th>жҲҝеҸ·</th>';flds.forEach(f=>h+='<th>'+f.label+'</th>');h+='<th>зӯҫеҗҚ</th><th>жҠ•зҘЁ</th><th>ж—¶й—ҙ</th></tr></thead><tbody>';v.voters.forEach(x=>{const vl=x.vote==='agree'?'<span class="bg a">иөһжҲҗ</span>':x.vote==='disagree'?'<span class="bg d">еҸҚеҜ№</span>':'<span class="bg ab">ејғжқғ</span>';const t=new Date(x.time).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});const sig=x.sig?'<img src="'+x.sig+'" class="sig-thumb" onclick="showSig(this.src)">':'-';h+='<tr><td>'+x.name+'</td><td>'+x.building+'</td><td>'+x.room+'</td>';flds.forEach(f=>h+='<td>'+(x.fields&&x.fields[f.key]||'-')+'</td>');h+='<td>'+sig+'</td><td>'+vl+'</td><td>'+t+'</td></tr>'});h+='</tbody></table>'}else h+='<p style="color:#666;text-align:center;padding:20px">жҡӮж— жҠ•зҘЁ</p>';document.getElementById('mdc').innerHTML=h;document.getElementById('md').classList.add('show')})}
</script></body></html>
